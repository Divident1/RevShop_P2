<div style="padding: 20px;">
  <h2>Product Management</h2>


  <!-- Products Table -->
  <table border="1" width="100%" style="margin-top: 20px; border-collapse: collapse;">
    <thead>
    <tr style="background-color: #f0f0f0;">
      <th>Name</th>
      <th>Category</th>
      <th>Price</th>
      <th>MRP</th>
      <th>Quantity</th>
      <th>Discount %</th>
      <th>Stock Threshold</th>
      <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr *ngFor="let p of products">
      <td>{{ p.name }}</td>
      <td>{{ p.category }}</td>
      <td>{{ p.price }}</td>
      <td>{{ p.mrp }}</td>
      <td>{{ p.quantity }}</td>
      <td>{{ p.discountPercentage }}</td>
      <td>{{ p.stockThreshold }}</td>
      <td>
        <button (click)="edit(p)">Edit</button>
        <button (click)="delete(p.id!)">Delete</button>
      </td>
    </tr>
    <tr *ngIf="products.length === 0">
      <td colspan="8" style="text-align: center;">No products available</td>
    </tr>
    </tbody>
  </table>
</div>
