<section class="seller-dashboard">
  <div class="dashboard-header">
    <div>
      <h2>Seller Dashboard</h2>
      <p>Manage your catalog, pricing, and stock in one place.</p>
    </div>
    <button class="add-product-btn" (click)="clear()">Add Product</button>
  </div>

  <app-product-form
    [product]="selectedProduct"
    (onSaved)="onSaved()">
  </app-product-form>

  <app-product-list
    [products]="products"
    (editProduct)="edit($event)"
    (productDeleted)="loadProducts()">
  </app-product-list>
</section>
