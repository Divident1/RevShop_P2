<h2>Buyer Dashboard</h2>

<a routerLink="/buyer/search">Search Products</a>

<div *ngFor="let p of products">
  <h3>{{p.name}}</h3>
  <p>{{p.description}}</p>
  <h4>₹ {{p.price}}</h4>
</div>
<div class="product-card">
  <img src="assets/images/product-dummy.png" class="product-img">

  <h3 class="product-name">Laptop</h3>
  <p class="product-price">₹45,000</p>
  <p class="product-desc">High performance laptop</p>

  <button class="btn-primary">View Details</button>
</div>
