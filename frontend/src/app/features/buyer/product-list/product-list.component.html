<div class="product-dashboard container animate-fade">
  <div class="dashboard-header">
    <h2 class="outfit">Curated Collections</h2>
    <p>Discover our range of premium products tailored for you.</p>
  </div>

  <!-- Product Grid -->
  <div class="product-grid">
    <div *ngFor="let p of products" class="product-card glass-panel">
      <!-- Image Placeholder (Modern Gradient) -->
      <div class="product-image-container">
        <div class="product-image-placeholder"></div>
        <button class="btn-favorite" (click)="toggleFavorite(p)" [class.active]="favoritesMap[p.id]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            [attr.fill]="favoritesMap[p.id] ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" />
          </svg>
        </button>
      </div>

      <div class="product-info">
        <div class="category-tag">{{ p.categoryName || 'Electronics' }}</div>
        <h3 class="product-name">{{p.name}}</h3>
        <p class="product-desc">{{p.description}}</p>

        <div class="product-bottom">
          <div class="price-section">
            <span class="current-price">₹{{p.price}}</span>
            <span class="old-price" *ngIf="p.mrp > p.price">₹{{p.mrp}}</span>
          </div>

          <!-- Add / Quantity Counter -->
          <button *ngIf="!cartQuantities[p.id]" class="btn-premium btn-primary btn-add-cart" (click)="addToCart(p)">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14" />
              <path d="M12 5v14" />
            </svg>
            Add
          </button>
          <div class="qty-counter" *ngIf="cartQuantities[p.id]">
            <button class="qty-btn qty-minus" (click)="decrementFromCart(p)">−</button>
            <span class="qty-value">{{ cartQuantities[p.id] }}</span>
            <button class="qty-btn qty-plus" (click)="addToCart(p)">+</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <button class="btn-premium btn-secondary" (click)="prev()" [disabled]="page === 0">Previous</button>
    <span class="page-number">Page {{page + 1}}</span>
    <button class="btn-premium btn-secondary" (click)="next()" [disabled]="products.length < 10">Next</button>
  </div>
</div>
